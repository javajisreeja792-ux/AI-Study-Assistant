image: python:3.12

stages:
  - quality
  - test

cache:
  paths:
    - .cache/pip

before_script:
  - python --version
  - pip install --upgrade pip
  - pip install -r requirements.txt
  - pip install pytest black ruff mypy bandit

quality:
  stage: quality
  script:
    - ruff check .
    - black --check .
    - mypy .
    - bandit -r . -x tests,venv,.venv

test:
  stage: test
  script:
    - pytest
